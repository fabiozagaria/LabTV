<main class="py-5">

  <div class="container">

    <div class="mb-5 text-center">

      <h1 class="fw-bold">
        Catalogo Film
      </h1>

      <p class="text-secondary">
        Esplora tutti i film disponibili su LabTV.
      </p>

    </div>

    @if (isLoading()) {
      <p class="text-center">Caricamento film...</p>
    } @else if (errorMessage()) {
      <div class="alert alert-danger text-center">
        {{ errorMessage() }}
      </div>
    } @else {
      <div class="row g-4">
        @for (movie of movies(); track movie.id) {
          <app-movie-card
            class="col-sm-6 col-md-4 col-lg-3"
            [movie]="movie">
          </app-movie-card>
        } @empty {
          <p class="text-center">Nessun film disponibile</p>
        }
      </div>
    }

  </div>

</main>
