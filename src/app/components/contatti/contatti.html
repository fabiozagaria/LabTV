<main class="py-5">

  <div class="container">

    <div class="text-center mb-5">
      <h1 class="fw-bold">Contatti</h1>

      <p class="text-secondary">
        LabTV e' un progetto Angular per esplorare film, consultare il catalogo e trovare rapidamente nuovi titoli da guardare.
      </p>
    </div>

    <div class="row g-4 align-items-stretch mb-5">

      <div class="col-lg-5">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body p-4">

            <h2 class="h4 fw-bold mb-4">Informazioni</h2>

            <div class="d-flex gap-3 mb-3">
              <i class="bi bi-envelope-fill text-warning fs-4"></i>
              <div>
                <h3 class="h6 mb-1">Email</h3>
                <a href="mailto:info@labtv.it" class="text-decoration-none text-dark">
                  info@labtv.it
                </a>
              </div>
            </div>

            <div class="d-flex gap-3 mb-3">
              <i class="bi bi-telephone-fill text-warning fs-4"></i>
              <div>
                <h3 class="h6 mb-1">Telefono</h3>
                <a href="tel:+390612345678" class="text-decoration-none text-dark">
                  +39 06 1234 5678
                </a>
              </div>
            </div>

            <div class="d-flex gap-3">
              <i class="bi bi-geo-alt-fill text-warning fs-4"></i>
              <div>
                <h3 class="h6 mb-1">Sede</h3>
                <p class="mb-0">Roma, Italia</p>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body p-4">

            <h2 class="h4 fw-bold mb-4">Scrivici</h2>

            <form>
              <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input
                  id="nome"
                  type="text"
                  class="form-control"
                  placeholder="Il tuo nome">
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  id="email"
                  type="email"
                  class="form-control"
                  placeholder="nome@email.it">
              </div>

              <div class="mb-4">
                <label for="messaggio" class="form-label">Messaggio</label>
                <textarea
                  id="messaggio"
                  class="form-control"
                  rows="5"
                  placeholder="Scrivi il tuo messaggio"></textarea>
              </div>

              <button type="button" class="btn btn-dark">
                Invia messaggio
              </button>
            </form>

          </div>
        </div>
      </div>

    </div>

    <section class="text-center">
      <h2 class="h4 fw-bold mb-3">Seguici sui social</h2>

      <div class="d-flex justify-content-center flex-wrap gap-3">
        <a
          href="https://www.facebook.com"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-outline-dark social-link">
          <i class="bi bi-facebook"></i>
          Facebook
        </a>

        <a
          href="https://www.instagram.com"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-outline-dark social-link">
          <i class="bi bi-instagram"></i>
          Instagram
        </a>

        <a
          href="https://x.com"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-outline-dark social-link">
          <i class="bi bi-twitter-x"></i>
          Twitter/X
        </a>

        <a
          href="https://www.youtube.com"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-outline-dark social-link">
          <i class="bi bi-youtube"></i>
          YouTube
        </a>
      </div>
    </section>

  </div>

</main>
